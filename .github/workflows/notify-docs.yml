name: Notify Docs of Release

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-docs:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release info
        env:
          GH_TOKEN: ${{ secrets.DOCS_CONTENT_SYNC_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REL_TAG: ${{ github.event.release.tag_name }}
          REL_NAME: ${{ github.event.release.name }}
          REL_BODY: ${{ github.event.release.body }}
          REL_URL: ${{ github.event.release.html_url }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$REL_TAG"
            NAME="$REL_NAME"
            BODY="$REL_BODY"
            URL="$REL_URL"
          else
            DATA=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName,name,body,url)
            TAG=$(jq -r '.tagName' <<<"$DATA")
            NAME=$(jq -r '.name' <<<"$DATA")
            BODY=$(jq -r '.body' <<<"$DATA")
            URL=$(jq -r '.url' <<<"$DATA")
          fi

          # Tag format: @lottiefiles/dotlottie-{name}@{version}
          PACKAGE_NAME=$(echo "$TAG" | sed -n 's|^@lottiefiles/dotlottie-\(.*\)@.*|\1|p')
          if [ -z "$PACKAGE_NAME" ]; then
            echo "Tag '$TAG' does not match expected format @lottiefiles/dotlottie-{name}@{version}"
            exit 0
          fi

          case "$PACKAGE_NAME" in
            web) PKG_DIR="packages/web" ;;
            wc)  PKG_DIR="packages/wc" ;;
            *)   PKG_DIR="packages/${PACKAGE_NAME}" ;;
          esac

          jq -n \
            --arg source_repo "$GITHUB_REPOSITORY" \
            --arg source_package "$PKG_DIR" \
            --arg release_tag "$TAG" \
            --arg release_name "$NAME" \
            --arg release_body "$BODY" \
            --arg release_url "$URL" \
            --arg sender "${{ github.actor }}" \
            '{event_type: "dotlottie-docs-eval", client_payload: {source_repo: $source_repo, source_package: $source_package, release_tag: $release_tag, release_name: $release_name, release_body: $release_body, release_url: $release_url, sender: $sender}}' \
            > payload.json

          echo "Dispatching for release: $TAG → $PKG_DIR"

      - name: Dispatch to docs-content
        env:
          GH_TOKEN: ${{ secrets.DOCS_CONTENT_SYNC_TOKEN }}
        run: |
          gh api --method POST \
            "/repos/LottieFiles/docs-content/dispatches" \
            --input payload.json
