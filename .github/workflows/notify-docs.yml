name: Notify Docs of Release

on:
  release:
    types: [published]

permissions: {}

jobs:
  resolve-package:
    runs-on: ubuntu-latest
    outputs:
      package_dir: ${{ steps.resolve.outputs.package_dir }}
      should_dispatch: ${{ steps.resolve.outputs.should_dispatch }}
    steps:
      - name: Resolve package from tag
        id: resolve
        run: |
          TAG="${{ github.event.release.tag_name }}"

          # Tag format: @lottiefiles/dotlottie-{name}@{version}
          # Extract the package short name (react, vue, svelte, solid, web, wc)
          PACKAGE_NAME=$(echo "$TAG" | sed -n 's|^@lottiefiles/dotlottie-\(.*\)@.*|\1|p')

          if [ -z "$PACKAGE_NAME" ]; then
            echo "Tag '$TAG' does not match expected format @lottiefiles/dotlottie-{name}@{version}"
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Map short name to package directory
          case "$PACKAGE_NAME" in
            web) PKG_DIR="packages/web" ;;
            wc)  PKG_DIR="packages/wc" ;;
            *)   PKG_DIR="packages/${PACKAGE_NAME}" ;;
          esac

          echo "package_dir=$PKG_DIR" >> "$GITHUB_OUTPUT"
          echo "should_dispatch=true" >> "$GITHUB_OUTPUT"
          echo "Resolved tag '$TAG' to package dir: $PKG_DIR"

  notify-docs:
    needs: resolve-package
    if: needs.resolve-package.outputs.should_dispatch == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to docs-content
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOCS_CONTENT_SYNC_TOKEN }}
          repository: LottieFiles/docs-content
          event-type: dotlottie-docs-eval
          client-payload: |
            {
              "source_repo": "${{ github.repository }}",
              "source_package": "${{ needs.resolve-package.outputs.package_dir }}",
              "release_tag": "${{ github.event.release.tag_name }}",
              "release_name": ${{ toJSON(github.event.release.name) }},
              "release_body": ${{ toJSON(github.event.release.body) }},
              "release_url": "${{ github.event.release.html_url }}",
              "sender": "${{ github.actor }}"
            }
