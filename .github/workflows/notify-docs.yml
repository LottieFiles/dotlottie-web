    steps:
      - name: Resolve latest release
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          SENDER: ${{ github.actor }}
        run: |
          DATA=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName,name,body,url)
          TAG=$(jq -r '.tagName' <<<"$DATA")
          NAME=$(jq -r '.name' <<<"$DATA")
          BODY=$(jq -r '.body' <<<"$DATA")
          URL=$(jq -r '.url' <<<"$DATA")

          # Allow-list: only known packages, semver-ish version.
          TAG_RE='^@lottiefiles/dotlottie-(react|vue|svelte|solid|web|wc)@[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
          if [[ ! "$TAG" =~ $TAG_RE ]]; then
            echo "Tag '$TAG' failed strict validation"
            exit 1
          fi
          PACKAGE_NAME="${BASH_REMATCH[1]}"

          case "$PACKAGE_NAME" in
            web) PKG_DIR="packages/web" ;;
            wc)  PKG_DIR="packages/wc" ;;
            *)   PKG_DIR="packages/${PACKAGE_NAME}" ;;
          esac

          jq -n \
            --arg source_repo "$GITHUB_REPOSITORY" \
            --arg source_package "$PKG_DIR" \
            --arg release_tag "$TAG" \
            --arg release_name "$NAME" \
            --arg release_body "$BODY" \
            --arg release_url "$URL" \
            --arg sender "$SENDER" \
            '{event_type: "dotlottie-docs-eval", client_payload: {source_repo: $source_repo, source_package: $source_package, release_tag: $release_tag, release_name: $release_name, release_body: $release_body, release_url: $release_url, sender: $sender}}' \
            > payload.json

          echo "Dispatching for release: $TAG → $PKG_DIR"

      - name: Dispatch to docs-content
        env:
          GH_TOKEN: ${{ secrets.DOCS_CONTENT_SYNC_TOKEN }}
        run: |
          gh api --method POST \
            "/repos/LottieFiles/docs-content/dispatches" \
            --input payload.json
