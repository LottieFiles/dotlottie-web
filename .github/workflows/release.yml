name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions: {}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⎔ Setup pnpm@v10
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: ⎔ Setup Node@lts
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version: lts/*

      - name: 📥 Install dependencies
        run: pnpm install

      - name: 🏗 Build packages
        run: pnpm build:packages

      - name: 🏗 Build apps & examples
        run: pnpm build:apps && pnpm build:examples

      - name: 🔍 Verify types
        run: pnpm type-check

      - name: 🕵️ Lint + Format
        run: pnpm exec biome check .

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: 🛡️ Test (Browser)
        run: pnpm test

  npm-release:
    name: NPM Release
    needs: validate
    runs-on: ubuntu-latest
    if: github.repository == 'LottieFiles/dotlottie-web'
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}

    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write

    steps:
      - name: 🛡 Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: ⎔ Setup pnpm@v10
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: ⎔ Setup Node@lts
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 🚀 Release to NPM
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          commit: 'chore: update versions'
          title: 'chore: update versions'
          publish: pnpm release:publish
          version: pnpm release:version
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Handoff for notify-docs.yml 
      - name: 📝 Write published manifest
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: printf '%s' "$PUBLISHED_PACKAGES" > published.json

      - name: 📤 Upload published manifest
        if: steps.changesets.outputs.published == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: published-packages
          path: published.json
          if-no-files-found: error
          retention-days: 7

  gpr-release:
    name: GPR Release
    needs: npm-release
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.repository == 'LottieFiles/dotlottie-web' &&
      needs.npm-release.result != 'cancelled' &&
      (
        needs.npm-release.outputs.published == 'true' ||
        needs.npm-release.result == 'failure' ||
        github.event_name == 'workflow_dispatch'
      )

    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: 🛡 Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: ⎔ Setup pnpm@v10
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: ⎔ Setup Node@lts
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 🏗 Build packages
        run: pnpm build:packages

      - name: 🚀 Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NPMRC=$(mktemp)
          trap 'rm -f "$NPMRC"' EXIT
          {
            echo "@lottiefiles:registry=https://npm.pkg.github.com/"
            echo '//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}'
          } > "$NPMRC"
          NPM_CONFIG_USERCONFIG="$NPMRC" pnpm changeset publish

  jsr-release:
    name: JSR Release
    needs: [npm-release, gpr-release]
    runs-on: ubuntu-latest
    if: needs.npm-release.outputs.published == 'true'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: 🛡 Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: ⎔ Setup pnpm@v10
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: ⎔ Setup Node@lts
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 🔄 Sync version to jsr.json
        run: |
          VERSION=$(jq -r '.version' ./packages/web/package.json)
          jq '.version = $newVersion' --arg newVersion "$VERSION" ./packages/web/jsr.json > temp.json
          mv temp.json ./packages/web/jsr.json

      # related issue https://github.com/denoland/deno/issues/26152
      - name: 🚀 Release to JSR
        working-directory: packages/web
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}
        run: |
          NPMRC=$(mktemp)
          trap 'rm -f "$NPMRC"' EXIT
          {
            echo "@lottiefiles:registry=https://registry.npmjs.org/"
            echo '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}'
          } > "$NPMRC"
          NPM_CONFIG_USERCONFIG="$NPMRC" npx jsr publish --allow-dirty
