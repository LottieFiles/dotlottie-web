name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: ⎔ Setup pnpm@v10
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: ⎔ Setup Node@lts
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version: lts/*

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 🏗 Build packages
        run: pnpm build:packages

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: |
            packages/*/dist
            packages/svelte/.svelte-kit
          retention-days: 1
          include-hidden-files: true

  lint:
    name: Lint & Format
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: ⎔ Setup pnpm@v10
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: ⎔ Setup Node@lts
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version: lts/*

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 📦 Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: packages

      - name: 🕵️ Lint + Format
        run: pnpm exec biome check .

  type-check:
    name: Type Check
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: ⎔ Setup pnpm@v10
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: ⎔ Setup Node@lts
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version: lts/*

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 📦 Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: packages

      - name: 🔍 Verify types
        run: pnpm type-check

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 🛡 Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: ⬇️ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: ⎔ Setup pnpm@v10
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: ⎔ Setup Node@lts
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version: lts/*

      - name: 📥 Install dependencies
        run: pnpm install

      - name: 📦 Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: packages

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: 🛡️ Test (with coverage)
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: pnpm vitest run --browser.headless --coverage --coverage.all=false --changed="origin/$BASE_REF"

      - name: Check coverage outputs
        if: always()
        id: coverage-check
        run: |
          echo "web=$(test -f packages/web/coverage/coverage-summary.json && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "react=$(test -f packages/react/coverage/coverage-summary.json && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "wc=$(test -f packages/wc/coverage/coverage-summary.json && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: 📏 Report coverage (web)
        if: always() && steps.coverage-check.outputs.web == 'true'
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2.12.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: packages/web
          name: '@lottiefiles/dotlottie-web'

      - name: 📏 Report coverage (react)
        if: always() && steps.coverage-check.outputs.react == 'true'
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2.12.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: packages/react
          name: '@lottiefiles/dotlottie-react'

      - name: 📏 Report coverage (wc)
        if: always() && steps.coverage-check.outputs.wc == 'true'
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2.12.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: packages/wc
          name: '@lottiefiles/dotlottie-wc'

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 🛡 Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: ⬇️ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: ⎔ Setup pnpm@v10
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: ⎔ Setup Node@lts
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version: lts/*

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 📏 Report bundle size
        uses: andresz1/size-limit-action@94bc357df29c36c8f8d50ea497c3e225c3c95d1d # v1.8.0
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build_script: build:packages
