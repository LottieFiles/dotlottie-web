        <script type="module">
            import { DotLottieWorker as DotLottie } from './dist/worker/index.js';

            for (const canvas of [document.querySelectorAll('canvas')[0]]) {
                const dotLottie = new DotLottie({
                    canvas,
                    src: canvas.getAttribute('data-src'),
                    autoplay: true,
                    loop: true,
                });

                dotLottie.addEventListener('load', console.log);
                dotLottie.addEventListener('play', console.log);
            }
        </script>
        <script>
            var script = document.createElement('script');
            script.onload = function () {
                var stats = new Stats();
                document.body.appendChild(stats.dom);
                requestAnimationFrame(function loop() {
                    stats.update();
                    requestAnimationFrame(loop);
                });
            };
            script.src = 'https://mrdoob.github.io/stats.js/build/stats.min.js';
            document.head.appendChild(script);
